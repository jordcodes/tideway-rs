services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tideway
      POSTGRES_PASSWORD: tideway
      POSTGRES_DB: tideway_load
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tideway -d tideway_load"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
