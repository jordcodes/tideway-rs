name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Docs drift guard
        run: python3 scripts/check_docs_drift.py

      - name: Quickstart parity guard
        run: python3 scripts/check_quickstart_parity.py

      - name: CLI filesystem guard
        run: bash scripts/check_cli_fs_writes.sh

      - name: Public API guard
        run: python3 scripts/check_public_api_surface.py

      - name: CLI tests
        run: cargo test -p tideway-cli

      - name: Module contract tests
        run: |
          cargo test --test prelude_smoke_test
          cargo test --test feature_gate_contract_test
